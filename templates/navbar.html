{# templates/navbar.html #}
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand" href="{% url 'dashboard' %}">
            <i class="fas fa-shipping-fast me-2"></i>Encomiendas
        </a>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        {% if user.is_authenticated %}
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}" href="{% url 'dashboard' %}">
                        Dashboard
                        {% if nav_activas > 0 %}
                        <span class="badge bg-light text-primary rounded-pill ms-1">{{ nav_activas }}</span>
                        {% endif %}
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'encomienda_lista' %}active{% endif %}" href="{% url 'encomienda_lista' %}">
                        Encomiendas
                        {% if nav_retraso > 0 %}
                        <span class="badge bg-danger rounded-pill ms-1">{{ nav_retraso }}</span>
                        {% endif %}
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'encomienda_crear' %}active{% endif %}" href="{% url 'encomienda_crear' %}">
                        <i class="fas fa-plus-circle me-1"></i>Nueva
                    </a>
                </li>
            </ul>
            
            <div class="d-flex align-items-center">
                <span class="navbar-text me-3">
                    <i class="fas fa-user me-1 text-light"></i>
                    <span class="text-light fw-bold">{{ user.username }}</span>
                </span>
                
                <form method="post" action="{% url 'logout' %}" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-light btn-sm">
                        <i class="fas fa-sign-out-alt me-1"></i>Salir
                    </button>
                </form>
            </div>
        </div>
        {% else %}
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a href="{% url 'login' %}" class="btn btn-outline-light">
                        <i class="fas fa-sign-in-alt me-1"></i>Iniciar sesión
                    </a>
                </li>
            </ul>
        </div>
        {% endif %}
    </div>
</nav>
