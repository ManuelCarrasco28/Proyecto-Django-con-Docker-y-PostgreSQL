version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=encomiendas_db
      - POSTGRES_USER=usuario_enc
      - POSTGRES_PASSWORD=pass_enc
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  web:
    build: .
    container_name: django_app
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - SECRET_KEY=django-insecure-m+p#%h&g$8)z!_1*0m@k)v$6(3^5u&j)9$#2!%
      - DATABASE_URL=postgres://usuario_enc:pass_enc@db:5432/encomiendas_db
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  redis_data: